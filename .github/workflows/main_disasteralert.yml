# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - disasteralert

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: anuchapa.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_453032A377EA4B689B04134AB64B09A1 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_E728D442E57140BCA27E5146C06BA343 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: anuchapa.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_453032A377EA4B689B04134AB64B09A1 }}/disasteralert:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4B070DE623F04A659837F2D1900F2D56 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_550661DF88EB4A999DC230922F0E267C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_73C9CFD9D034428395A216B3EA9583DE }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'disasteralert'
          slot-name: 'Production'
          images: 'anuchapa.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_453032A377EA4B689B04134AB64B09A1 }}/disasteralert:${{ github.sha }}'
          