<div style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: auto; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden;">
    <div style="background-color: #d9534f; color: white; padding: 20px; text-align: center;">
        <h2 style="margin: 0;">Disaster Alert Notification</h2>
    </div>

    <div style="padding: 20px; color: #333;">
        <table style="width: 100%; border-collapse: collapse;">
            <tr style="border-bottom: 1px solid #f0f0f0;">
                <td style="padding: 10px 0; font-weight: bold; width: 30%;">Region ID:</td>
                <td style="padding: 10px 0;">{{regionId}}</td>
            </tr>
            <tr style="border-bottom: 1px solid #f0f0f0;">
                <td style="padding: 10px 0; font-weight: bold;">Disaster Type:</td>
                <td style="padding: 10px 0;">{{disasterType}}</td>
            </tr>
            <tr style="border-bottom: 1px solid #f0f0f0;">
                <td style="padding: 10px 0; font-weight: bold;">Risk Level:</td>
                <td style="padding: 10px 0;">
                    <span style="padding: 4px 10px; border-radius: 4px; background-color: #ffeded; color: #d9534f; font-weight: bold;">
                        {{riskLevel}}
                    </span>
                </td>
            </tr>
            <tr style="border-bottom: 1px solid #f0f0f0;">
                <td style="padding: 10px 0; font-weight: bold;">Timestamp:</td>
                <td style="padding: 10px 0; color: #666;">{{timestamp}}</td>
            </tr>
            <tr>
                <td colspan="2" style="padding: 20px 0 10px 0; font-weight: bold;">Alert Message:</td>
            </tr>
            <tr>
                <td colspan="2" style="padding: 15px; background-color: #f9f9f9; border-left: 4px solid #d9534f; line-height: 1.6;">
                    {{alertMessage}}
                </td>
            </tr>
        </table>
    </div>

    <div style="background-color: #f4f4f4; padding: 15px; text-align: center; font-size: 12px; color: #888;">
        This is an automated alert. Please do not reply.
    </div>
</div>
